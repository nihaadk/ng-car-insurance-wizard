  <line x1="830" y1="375" x2="830" y2="462" stroke="#E3DBBB" stroke-width="1"/>
  <text x="842" y="387" fill="#41431B" font-size="10" font-weight="600" opacity="0.65">Coverages</text>
  <text x="842" y="400" fill="#41431B" font-size="10" opacity="0.55">selectedCoverages</text>
  <text x="842" y="413" fill="#41431B" font-size="10" opacity="0.55">totalPrice()</text>
  <line x1="680" y1="422" x2="936" y2="422" stroke="#E3DBBB" stroke-width="1"/>
  <text x="806" y="438" fill="#AEB784" font-size="10" font-weight="600" text-anchor="middle">Read-only summary — no writes</text>
  <text x="806" y="454" fill="#41431B" font-size="10" opacity="0.55" text-anchor="middle">All data from single WizardStore inject</text>

  <!-- ══════════════════════════════════════════════════ -->
