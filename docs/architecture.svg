  <circle cx="36" cy="530" r="4" fill="#41431B"/>
  <circle cx="36" cy="542" r="4" fill="#E3DBBB"/>
  <circle cx="36" cy="554" r="4" fill="#E3DBBB"/>
  <circle cx="36" cy="566" r="4" fill="#E3DBBB"/>
