<svg width="960" height="580" viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#41431B" flood-opacity="0.12"/>
    </filter>
    <filter id="sm-shadow" x="-6%" y="-6%" width="115%" height="125%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#41431B" flood-opacity="0.09"/>
    </filter>
    <marker id="arrow-dark" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#41431B" opacity="0.55"/>
    </marker>
    <marker id="arrow-mid" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#AEB784"/>
    </marker>
    <marker id="arrow-write" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#41431B"/>
    </marker>
  </defs>

  <!-- ── Background ── -->
  <rect width="960" height="580" fill="#F8F3E1"/>

  <!-- ── Header ── -->
  <rect width="960" height="64" fill="#41431B"/>
  <g transform="translate(24,14)" fill="none">
    <rect width="36" height="36" rx="8" fill="#AEB784" opacity="0.18"/>
    <path d="M28 13.5c-.25-.7-.9-1.2-1.65-1.2H9.65c-.75 0-1.4.5-1.65 1.2L6 19.5v8.5c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h16v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8.5l-2-6z" fill="#AEB784"/>
    <circle cx="11" cy="25" r="2" fill="#3a3d15"/>
    <circle cx="25" cy="25" r="2" fill="#3a3d15"/>
  </g>
  <text x="70" y="38" fill="#F8F3E1" font-size="20" font-weight="700" letter-spacing="-0.3">ng-car-insurance-wizard</text>
  <text x="70" y="55" fill="#AEB784" font-size="11.5" letter-spacing="0.3">Store &amp; Component Architecture</text>
  <text x="940" y="38" fill="#E3DBBB" font-size="11" text-anchor="end">Angular 21  ·  NgRx Signal Store  ·  Signal Forms</text>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- ── LAYER LABEL: STORES ── -->
  <!-- ══════════════════════════════════════════════════ -->
  <text x="16" y="88" fill="#41431B" font-size="9.5" font-weight="700" letter-spacing="2.5" opacity="0.45">STORE LAYER</text>

  <!-- ─────────────────────────────────────────────── -->
  <!-- WIZARD STORE (big container) -->
  <!-- ─────────────────────────────────────────────── -->
  <rect x="16" y="94" width="670" height="165" rx="14" fill="#41431B" filter="url(#shadow)"/>
  <!-- inner bg -->
  <rect x="24" y="118" width="654" height="133" rx="10" fill="#4e5120"/>

  <!-- title row -->
  <text x="36" y="111" fill="#F8F3E1" font-size="13" font-weight="700">WizardStore</text>
  <rect x="148" y="97" width="110" height="18" rx="9" fill="#AEB784" opacity="0.2"/>
  <text x="203" y="110" fill="#AEB784" font-size="10" text-anchor="middle">providedIn: 'root'</text>
  <text x="490" y="111" fill="#AEB784" font-size="10.5" opacity="0.7">All features composed via signalStore()</text>

  <!-- ── withCarFeature ── -->
  <rect x="32" y="124" width="186" height="119" rx="10" fill="#F8F3E1" opacity="0.94"/>
  <rect x="32" y="124" width="186" height="24" rx="10" fill="#AEB784"/>
  <rect x="32" y="136" width="186" height="12" fill="#AEB784"/>
  <text x="125" y="140" fill="#41431B" font-size="11" font-weight="700" text-anchor="middle">withCarFeature()</text>
  <!-- state fields -->
  <text x="44" y="161" fill="#41431B" font-size="10.5" opacity="0.75">state</text>
  <text x="80" y="161" fill="#41431B" font-size="10">make, model, year</text>
  <text x="80" y="175" fill="#41431B" font-size="10">licensePlate, fuelType</text>
  <text x="80" y="189" fill="#41431B" font-size="10">mileage</text>
  <line x1="44" y1="197" x2="210" y2="197" stroke="#E3DBBB" stroke-width="1"/>
  <text x="44" y="210" fill="#41431B" font-size="10.5" opacity="0.75">method</text>
  <text x="85" y="210" fill="#41431B" font-size="10">updateCar(data)</text>
  <text x="80" y="224" fill="#41431B" font-size="10" opacity="0.5">→ patchState()</text>

  <!-- ── withPersonalFeature ── -->
  <rect x="228" y="124" width="210" height="119" rx="10" fill="#F8F3E1" opacity="0.94"/>
  <rect x="228" y="124" width="210" height="24" rx="10" fill="#AEB784"/>
  <rect x="228" y="136" width="210" height="12" fill="#AEB784"/>
  <text x="333" y="140" fill="#41431B" font-size="11" font-weight="700" text-anchor="middle">withPersonalFeature()</text>
  <text x="240" y="161" fill="#41431B" font-size="10.5" opacity="0.75">state</text>
  <text x="278" y="161" fill="#41431B" font-size="10">firstName, lastName</text>
  <text x="278" y="175" fill="#41431B" font-size="10">birthDate, email</text>
  <text x="278" y="189" fill="#41431B" font-size="10">phone, address, city, zip</text>
  <line x1="240" y1="197" x2="430" y2="197" stroke="#E3DBBB" stroke-width="1"/>
  <text x="240" y="210" fill="#41431B" font-size="10.5" opacity="0.75">method</text>
  <text x="283" y="210" fill="#41431B" font-size="10">updatePersonal(data)</text>
  <text x="278" y="224" fill="#41431B" font-size="10" opacity="0.5">→ patchState()</text>

  <!-- ── withCoverageFeature ── -->
  <rect x="448" y="124" width="222" height="119" rx="10" fill="#F8F3E1" opacity="0.94"/>
  <rect x="448" y="124" width="222" height="24" rx="10" fill="#AEB784"/>
  <rect x="448" y="136" width="222" height="12" fill="#AEB784"/>
  <text x="559" y="140" fill="#41431B" font-size="11" font-weight="700" text-anchor="middle">withCoverageFeature()</text>
  <text x="460" y="161" fill="#41431B" font-size="10.5" opacity="0.75">state</text>
  <text x="496" y="161" fill="#41431B" font-size="10">coverages: Coverage[]</text>
  <text x="460" y="175" fill="#41431B" font-size="10.5" opacity="0.75">computed</text>
  <text x="510" y="175" fill="#41431B" font-size="10">selectedCoverages()</text>
  <text x="510" y="189" fill="#41431B" font-size="10">totalPrice()</text>
  <line x1="460" y1="197" x2="662" y2="197" stroke="#E3DBBB" stroke-width="1"/>
  <text x="460" y="210" fill="#41431B" font-size="10.5" opacity="0.75">method</text>
  <text x="501" y="210" fill="#41431B" font-size="10">toggleCoverage(id)</text>
  <text x="496" y="224" fill="#41431B" font-size="10" opacity="0.5">→ patchState()</text>

  <!-- ── NAVIGATION STORE ── -->
  <rect x="700" y="94" width="244" height="165" rx="14" fill="#41431B" filter="url(#shadow)"/>
  <rect x="708" y="118" width="228" height="133" rx="10" fill="#4e5120"/>
  <text x="718" y="111" fill="#F8F3E1" font-size="13" font-weight="700">NavigationStore</text>
  <rect x="860" y="97" width="76" height="18" rx="9" fill="#AEB784" opacity="0.2"/>
  <text x="898" y="110" fill="#AEB784" font-size="10" text-anchor="middle">providedIn: 'root'</text>

  <rect x="716" y="124" width="214" height="119" rx="10" fill="#F8F3E1" opacity="0.94"/>
  <rect x="716" y="124" width="214" height="24" rx="10" fill="#AEB784"/>
  <rect x="716" y="136" width="214" height="12" fill="#AEB784"/>
  <text x="823" y="140" fill="#41431B" font-size="11" font-weight="700" text-anchor="middle">withState + withMethods</text>
  <text x="728" y="161" fill="#41431B" font-size="10.5" opacity="0.75">state</text>
  <text x="765" y="161" fill="#41431B" font-size="10">currentStepIndex: number</text>
  <line x1="728" y1="170" x2="922" y2="170" stroke="#E3DBBB" stroke-width="1"/>
  <text x="728" y="184" fill="#41431B" font-size="10.5" opacity="0.75">inject</text>
  <text x="764" y="184" fill="#41431B" font-size="10">Router</text>
  <line x1="728" y1="193" x2="922" y2="193" stroke="#E3DBBB" stroke-width="1"/>
  <text x="728" y="207" fill="#41431B" font-size="10.5" opacity="0.75">methods</text>
  <text x="775" y="207" fill="#41431B" font-size="10">syncWithPath(path)</text>
  <text x="775" y="220" fill="#41431B" font-size="10">goToStep(i) / nextStep()</text>
  <text x="775" y="233" fill="#41431B" font-size="10">prevStep()</text>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- ── CONNECTION ARROWS (Stores → Components) ── -->
  <!-- ══════════════════════════════════════════════════ -->

  <!-- WizardStore → CarStep -->
  <line x1="125" y1="259" x2="95" y2="335" stroke="#41431B" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrow-dark)" opacity="0.55"/>
  <rect x="50" y="282" width="92" height="16" rx="8" fill="#E3DBBB"/>
  <text x="96" y="294" fill="#41431B" font-size="9.5" font-weight="600" text-anchor="middle">inject(WizardStore)</text>

  <!-- WizardStore → PersonalStep -->
  <line x1="333" y1="259" x2="315" y2="335" stroke="#41431B" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrow-dark)" opacity="0.55"/>

  <!-- WizardStore → CoverageStep -->
  <line x1="559" y1="259" x2="549" y2="335" stroke="#41431B" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrow-dark)" opacity="0.55"/>

  <!-- WizardStore → OfferStep (reads all) -->
  <line x1="600" y1="259" x2="756" y2="335" stroke="#41431B" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrow-dark)" opacity="0.55"/>

  <!-- NavigationStore → all steps (single fan-out line) -->
  <line x1="822" y1="259" x2="822" y2="295" stroke="#AEB784" stroke-width="2" marker-end="url(#arrow-mid)"/>
  <line x1="822" y1="295" x2="95" y2="295" stroke="#AEB784" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="822" y1="295" x2="822" y2="335" stroke="#AEB784" stroke-width="2" marker-end="url(#arrow-mid)"/>
  <!-- tap points to each step -->
  <circle cx="95" cy="295" r="3.5" fill="#AEB784"/>
  <line x1="95" y1="295" x2="95" y2="335" stroke="#AEB784" stroke-width="1.8" marker-end="url(#arrow-mid)" stroke-dasharray="4,2.5"/>
  <circle cx="315" cy="295" r="3.5" fill="#AEB784"/>
  <line x1="315" y1="295" x2="315" y2="335" stroke="#AEB784" stroke-width="1.8" marker-end="url(#arrow-mid)" stroke-dasharray="4,2.5"/>
  <circle cx="549" cy="295" r="3.5" fill="#AEB784"/>
  <line x1="549" y1="295" x2="549" y2="335" stroke="#AEB784" stroke-width="1.8" marker-end="url(#arrow-mid)" stroke-dasharray="4,2.5"/>
  <circle cx="756" cy="295" r="3.5" fill="#AEB784"/>
  <line x1="756" y1="295" x2="756" y2="335" stroke="#AEB784" stroke-width="1.8" marker-end="url(#arrow-mid)" stroke-dasharray="4,2.5"/>
  <!-- label -->
  <rect x="380" y="285" width="136" height="16" rx="8" fill="#AEB784"/>
  <text x="448" y="297" fill="#41431B" font-size="9.5" font-weight="700" text-anchor="middle">inject(NavigationStore)</text>

  <!-- write-back arrows (components → store) -->
  <!-- CarStep → WizardStore (updateCar) -->
  <path d="M76,335 C56,315 100,275 115,259" stroke="#41431B" stroke-width="1.5" fill="none" stroke-dasharray="3,2" marker-end="url(#arrow-write)" opacity="0.4"/>
  <text x="42" y="310" fill="#41431B" font-size="9" opacity="0.55" font-style="italic">updateCar()</text>
  <!-- PersonalStep → WizardStore -->
  <path d="M296,335 C276,315 320,275 330,259" stroke="#41431B" stroke-width="1.5" fill="none" stroke-dasharray="3,2" marker-end="url(#arrow-write)" opacity="0.4"/>
  <text x="258" y="310" fill="#41431B" font-size="9" opacity="0.55" font-style="italic">updatePersonal()</text>
  <!-- CoverageStep → WizardStore -->
  <path d="M532,335 C514,315 556,275 562,259" stroke="#41431B" stroke-width="1.5" fill="none" stroke-dasharray="3,2" marker-end="url(#arrow-write)" opacity="0.4"/>
  <text x="494" y="310" fill="#41431B" font-size="9" opacity="0.55" font-style="italic">toggleCoverage()</text>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- ── LAYER LABEL: COMPONENTS ── -->
  <!-- ══════════════════════════════════════════════════ -->
  <text x="16" y="332" fill="#41431B" font-size="9.5" font-weight="700" letter-spacing="2.5" opacity="0.45">COMPONENT LAYER</text>

  <!-- ──────── STEP CARDS ──────── -->

  <!-- CarStep -->
  <rect x="16" y="338" width="200" height="138" rx="12" fill="white" filter="url(#sm-shadow)"/>
  <rect x="16" y="338" width="200" height="34" rx="12" fill="#41431B"/>
  <rect x="16" y="358" width="200" height="14" fill="#41431B"/>
  <text x="116" y="360" fill="#F8F3E1" font-size="12.5" font-weight="700" text-anchor="middle">CarStep</text>
  <rect x="80" y="346" width="72" height="16" rx="8" fill="#AEB784" opacity="0.2"/>
  <text x="116" y="358" fill="#AEB784" font-size="9" text-anchor="middle">Signal Forms</text>
  <!-- content -->
  <text x="30" y="390" fill="#41431B" font-size="10" opacity="0.65">form(formModel, schema =&gt;</text>
  <text x="36" y="404" fill="#41431B" font-size="10" opacity="0.65">required(s.make)</text>
  <text x="36" y="417" fill="#41431B" font-size="10" opacity="0.65">min(s.year, 1980)</text>
  <text x="36" y="430" fill="#41431B" font-size="10" opacity="0.65">required(s.fuelType) )</text>
  <line x1="28" y1="438" x2="204" y2="438" stroke="#E3DBBB" stroke-width="1"/>
  <text x="116" y="451" fill="#AEB784" font-size="10" font-weight="600" text-anchor="middle">FormField · FormRoot</text>
  <rect x="28" y="458" width="90" height="12" rx="6" fill="#F8F3E1"/>
  <text x="73" y="468" fill="#41431B" font-size="9" text-anchor="middle">reads initial values</text>
  <rect x="124" y="458" width="84" height="12" rx="6" fill="#41431B" opacity="0.12"/>
  <text x="166" y="468" fill="#41431B" font-size="9" text-anchor="middle">writes on submit</text>

  <!-- PersonalStep -->
  <rect x="228" y="338" width="200" height="138" rx="12" fill="white" filter="url(#sm-shadow)"/>
  <rect x="228" y="338" width="200" height="34" rx="12" fill="#41431B"/>
  <rect x="228" y="358" width="200" height="14" fill="#41431B"/>
  <text x="328" y="360" fill="#F8F3E1" font-size="12.5" font-weight="700" text-anchor="middle">PersonalStep</text>
  <rect x="292" y="346" width="72" height="16" rx="8" fill="#AEB784" opacity="0.2"/>
  <text x="328" y="358" fill="#AEB784" font-size="9" text-anchor="middle">Signal Forms</text>
  <text x="242" y="390" fill="#41431B" font-size="10" opacity="0.65">form(formModel, schema =&gt;</text>
  <text x="248" y="404" fill="#41431B" font-size="10" opacity="0.65">required(s.firstName)</text>
  <text x="248" y="417" fill="#41431B" font-size="10" opacity="0.65">required(s.email)</text>
  <text x="248" y="430" fill="#41431B" font-size="10" opacity="0.65">email(s.email) )</text>
  <line x1="240" y1="438" x2="416" y2="438" stroke="#E3DBBB" stroke-width="1"/>
  <text x="328" y="451" fill="#AEB784" font-size="10" font-weight="600" text-anchor="middle">FormField · FormRoot</text>
  <rect x="240" y="458" width="90" height="12" rx="6" fill="#F8F3E1"/>
  <text x="285" y="468" fill="#41431B" font-size="9" text-anchor="middle">reads initial values</text>
  <rect x="336" y="458" width="84" height="12" rx="6" fill="#41431B" opacity="0.12"/>
  <text x="378" y="468" fill="#41431B" font-size="9" text-anchor="middle">writes on submit</text>

  <!-- CoverageStep -->
  <rect x="440" y="338" width="216" height="138" rx="12" fill="white" filter="url(#sm-shadow)"/>
  <rect x="440" y="338" width="216" height="34" rx="12" fill="#41431B"/>
  <rect x="440" y="358" width="216" height="14" fill="#41431B"/>
  <text x="548" y="360" fill="#F8F3E1" font-size="12.5" font-weight="700" text-anchor="middle">CoverageStep</text>
  <text x="452" y="390" fill="#41431B" font-size="10" opacity="0.65">reads wizardStore.coverages()</text>
  <text x="452" y="404" fill="#41431B" font-size="10" opacity="0.65">reads wizardStore.totalPrice()</text>
  <line x1="452" y1="413" x2="644" y2="413" stroke="#E3DBBB" stroke-width="1"/>
  <text x="548" y="427" fill="#41431B" font-size="10" opacity="0.65">Toggle buttons per coverage</text>
  <text x="452" y="442" fill="#41431B" font-size="10" opacity="0.65">→ toggleCoverage(id)</text>
  <line x1="452" y1="451" x2="644" y2="451" stroke="#E3DBBB" stroke-width="1"/>
  <text x="548" y="465" fill="#AEB784" font-size="10" font-weight="600" text-anchor="middle">No form — pure signal toggle</text>

  <!-- OfferStep -->
  <rect x="668" y="338" width="276" height="138" rx="12" fill="white" filter="url(#sm-shadow)"/>
  <rect x="668" y="338" width="276" height="34" rx="12" fill="#41431B"/>
  <rect x="668" y="358" width="276" height="14" fill="#41431B"/>
  <text x="806" y="360" fill="#F8F3E1" font-size="12.5" font-weight="700" text-anchor="middle">OfferStep</text>
  <rect x="756" y="344" width="100" height="16" rx="8" fill="#AEB784" opacity="0.2"/>
  <text x="806" y="356" fill="#AEB784" font-size="9" text-anchor="middle">reads from WizardStore</text>
  <!-- columns inside -->
  <text x="680" y="387" fill="#41431B" font-size="10" font-weight="600" opacity="0.65">Car</text>
  <text x="680" y="400" fill="#41431B" font-size="10" opacity="0.55">make, model, year</text>
  <text x="680" y="413" fill="#41431B" font-size="10" opacity="0.55">fuelType, mileage</text>
  <line x1="742" y1="375" x2="742" y2="462" stroke="#E3DBBB" stroke-width="1"/>
  <text x="754" y="387" fill="#41431B" font-size="10" font-weight="600" opacity="0.65">Personal</text>
