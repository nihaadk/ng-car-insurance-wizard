  <text x="920" y="513" fill="#F8F3E1" font-size="7" text-anchor="middle" opacity="0.7">DE</text>
  <!-- sidebar 20% -->
  <rect x="16" y="520" width="186" height="36" fill="#F0EDD4"/>
  <text x="109" y="542" fill="#41431B" font-size="10" font-weight="600" text-anchor="middle" opacity="0.50">Sidebar · NavigationStore</text>
