<nav class="bg-w-dark text-w-pale shadow-md px-6 py-3 flex items-center justify-between">
  <div class="flex items-center gap-2">
    <svg class="w-7 h-7 text-w-mid" viewBox="0 0 24 24" fill="currentColor">
      <path
        d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.85 7h10.29l1.08 3.11H5.77L6.85 7zM19 17H5v-5h14v5z"
      />
      <circle cx="7.5" cy="14.5" r="1.5" />
      <circle cx="16.5" cy="14.5" r="1.5" />
    </svg>
    <span class="text-xl font-bold tracking-wide">{{ 'nav.logo' | translate }}</span>
  </div>

  <div class="flex items-center gap-1 bg-w-dark/50 rounded-full p-1">
    <button
      (click)="switchLanguage('en')"
      [class.bg-w-mid]="currentLang() === 'en'"
      [class.text-w-dark]="currentLang() === 'en'"
      [class.text-w-pale]="currentLang() !== 'en'"
      class="px-3 py-1 rounded-full text-sm font-semibold transition-all duration-200 cursor-pointer"
    >
      EN
    </button>
    <button
      (click)="switchLanguage('de')"
      [class.bg-w-mid]="currentLang() === 'de'"
      [class.text-w-dark]="currentLang() === 'de'"
      [class.text-w-pale]="currentLang() !== 'de'"
      class="px-3 py-1 rounded-full text-sm font-semibold transition-all duration-200 cursor-pointer"
    >
      DE
    </button>
  </div>
</nav>
